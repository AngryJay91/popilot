id: notion
name: "Notion"
category: pm_tool
description: "태스크 관리, 문서 관리, 로드맵"

mcp:
  server_name: "moonklabs-notion-task"
  tools: [notion-task-list, notion-task-create, notion-task-update, notion-task-update-status, notion-task-add-log, notion-task-my-sprint, notion-search, notion-fetch, notion-create-pages, notion-update-page]

setup_questions:
  - key: workspace
    label: "Notion 워크스페이스 이름"
    type: string
    required: false
    example: "My Workspace"
  - key: daily_page_id
    label: "일일업무일지 상위 페이지 ID"
    type: string
    required: false
    example: "abc123..."

agent_prompts:
  strategist: |
    ### Notion MCP
    ```
    용도: PRD 조회/생성, 로드맵 연동
    사용법:
    - notion-search: 기존 PRD 검색
    - notion-fetch: 특정 문서 조회
    - notion-create-pages: 새 PRD 생성
    ```

    #### 활용 예시
    ```
    🎯 Simon: "노션에서 경쟁사 분석 문서 찾아볼게요."
    → notion-search({ query: "경쟁사 분석" })
    ```

  planner: |
    ### Notion MCP
    ```
    용도: 스프린트 문서 관리, 스토리 생성
    사용법:
    - notion-search: 스프린트 문서 검색
    - notion-fetch: 특정 스토리 조회
    - notion-create-pages: 새 스토리 생성
    - notion-update-page: 진행 상태 업데이트
    ```

    ### 활용 예시
    ```
    📋 Penny: "현재 스프린트 문서 확인해볼게요."
    → notion-fetch({ id: "Sprint-51-PRD-링크" })

    📋 Penny: "새 스토리 생성할게요."
    → notion-create-pages({ parent: {page_id: "..."}, pages: [...] })
    ```

command_prompts:
  daily: |
    ### 노션 페이지 확인 및 생성

    **상위 페이지**: `{{config.daily_page_id}}` (일일업무일지)

    1. 상위 페이지에서 해당 날짜 제목의 하위 페이지 존재 여부 확인
    2. 없으면 새로 생성, 있으면 업데이트

    ### 노션 업로드

    ```javascript
    mcp__notion__notion-create-pages({
      parent: { page_id: "{{config.daily_page_id}}" },
      pages: [{
        properties: { title: "{YYYY-MM-DD}" },
        content: "{포맷된 마크다운}"
      }]
    })
    ```

workflow_rules:
  - content: |
      ## MCP 사용 가이드

      ### 노션 MCP

      노션 MCP로 태스크 관리, 문서 조회/생성이 가능합니다.

      | 도구 | 용도 |
      |------|------|
      | `notion-task-my-sprint` | 내 스프린트 작업 조회 |
      | `notion-task-list` | 전체 작업 목록 조회 |
      | `notion-task-create` | 새 작업 생성 |
      | `notion-task-update` | 작업 수정 |
      | `notion-task-update-status` | 상태만 변경 |
      | `notion-task-add-log` | 진행 로그 추가 |

      사용자/스프린트 매핑: `.secrets.yaml` 참조

      ---

      ## Story → 노션 태스크 업로드

      ### 개요

      ```
      spec-site (Source of Truth)    →    Notion (실행 추적)
      Story Spec (상세 기획)          →    Task (진행 관리)
      ```

      ### 매핑 규칙

      | Story 섹션 | 노션 태스크 섹션 |
      |------------|-----------------|
      | 사용자 스토리 | **목표** (As a / I want / So that) |
      | 수락 기준 (AC) | **목표** (AC 목록 요약) |
      | 태스크 분해 | **할일내역** (체크박스) |
      | 기대효과 | **완료시 기대효과** |

      ### 태스크 속성 규칙

      | 속성 | 값 | 예시 |
      |------|-----|------|
      | 제목 | `[Epic-Story] 제목` | `[E-02-S-06] 캠페인 목록 정렬` |
      | 태그 | Sprint, Epic, 영역, 우선순위 | `S52`, `E-02`, `FE`, `P1` |
      | 담당자 | `.secrets.yaml` userId | 담당자 ID |
      | 스프린트 | `.secrets.yaml` sprintId | Sprint 페이지 ID |
      | 우선순위 | P0→높음, P1→중간, P2→낮음 | `중간` |

footer_tool_line: "Notion MCP"
