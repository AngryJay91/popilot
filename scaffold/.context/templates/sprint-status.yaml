# Sprint Status Template
# BMAD-METHOD 기반 상태 추적 파일

# ============================================================
# 메타 정보
# ============================================================
meta:
  sprint: 0  # 스프린트 번호
  title: "[스프린트 제목]"
  created: "YYYY-MM-DD"
  updated: "YYYY-MM-DD"
  project: jangsawang
  period:
    start: "YYYY-MM-DD"
    end: "YYYY-MM-DD"

# ============================================================
# 상태 정의
# ============================================================
status_definitions:
  epic:
    - backlog      # 대기 중
    - in-progress  # 진행 중 (하나 이상의 스토리가 시작됨)
    - done         # 완료 (모든 스토리 완료)

  story:
    - backlog        # 대기 중
    - ready-for-dev  # 개발 준비 완료 (핸드오프 완료)
    - in-progress    # 개발 중
    - review         # 코드 리뷰 중
    - done           # 완료

# ============================================================
# 워크플로우 가이드라인
# ============================================================
# 1. 첫 스토리 시작 시 → 에픽을 in-progress로 변경
# 2. 스토리 완료 후 → 다음 스토리 생성 (학습 반영)
# 3. 개발자가 작업 완료 → review 상태로 변경
# 4. 코드 리뷰 통과 → done 상태로 변경
# 5. 모든 스토리 done → 에픽을 done으로 변경

# ============================================================
# 개발 현황
# ============================================================
development:

  # ------------------------------------------------------------
  # Epic 1: [에픽 제목]
  # ------------------------------------------------------------
  - epic: E-01
    title: "[에픽 제목]"
    priority: P0
    status: backlog
    owner: "[담당자]"
    stories:
      - id: E-01-S-01
        title: "[스토리 제목]"
        status: backlog
        priority: P0
        size: M
        assignee: null
        depends_on: []

      - id: E-01-S-02
        title: "[스토리 제목]"
        status: backlog
        priority: P0
        size: L
        assignee: null
        depends_on: [E-01-S-01]

  # ------------------------------------------------------------
  # Epic 2: [에픽 제목]
  # ------------------------------------------------------------
  - epic: E-02
    title: "[에픽 제목]"
    priority: P0
    status: backlog
    owner: "[담당자]"
    stories:
      - id: E-02-S-01
        title: "[스토리 제목]"
        status: backlog
        priority: P0
        size: M
        assignee: null
        depends_on: []

# ============================================================
# 요약 통계 (자동 계산용 참고)
# ============================================================
summary:
  total_epics: 0
  total_stories: 0
  by_status:
    backlog: 0
    ready-for-dev: 0
    in-progress: 0
    review: 0
    done: 0
  progress_percent: 0

# ============================================================
# 변경 이력
# ============================================================
changelog:
  - date: "YYYY-MM-DD"
    author: "[작성자]"
    changes: "초기 생성"
